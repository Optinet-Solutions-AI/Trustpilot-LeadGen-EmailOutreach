swagger: "2.0"
info:
  title: trustpilot-api
  description: Trustpilot LeadGen API Gateway proxy to Cloud Run
  version: "1.1.0"
schemes:
  - https
produces:
  - application/json
x-google-backend:
  address: https://trustpilot-api-pmj2zcippq-uc.a.run.app
  jwt_audience: https://trustpilot-api-pmj2zcippq-uc.a.run.app
  protocol: h2
